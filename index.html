<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<meta name="theme-color" content="#05070a" id="themeColorMeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>BookShelf Flow</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

html{
  background:#05070a;
  min-height:100%;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top, #1f2937 0%, #0b0f14 45%, #05070a 100%);
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  padding-bottom:110px;
}

h1{
  margin:0;
  padding:24px 20px 12px;
  font-size:32px;
  font-weight:800;
  letter-spacing:0.02em;
}

.screen{
  display:none;
}

.active{
  display:block;
}

.controls{
  padding:12px 20px 20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input,
select,
button,
textarea{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  box-sizing:border-box;
  font-family:inherit;
}

input,
select{
  background:rgba(255,255,255,0.09);
  color:#fff;
  border:1px solid rgba(255,255,255,0.08);
  outline:none;
}

input::placeholder{
  color:rgba(255,255,255,0.45);
}

select{
  appearance:none;
}

button{
  background:linear-gradient(135deg, #ffffff, #dbeafe);
  color:#05070a;
  font-weight:700;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

button:active{
  transform:scale(0.98);
}

.loading{
  color:#7dd3fc;
  font-size:14px;
  line-height:1.6;
}

#reader{
  width:100%;
  max-width:420px;
  margin:auto;
  overflow:hidden;
  border-radius:20px;
}

.toggleArea{
  display:flex;
  gap:10px;
  padding:0 20px 14px;
}

.toggleButton{
  flex:1;
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:none;
}

.activeToggle{
  background:#fff;
  color:#05070a;
}

.series{
  margin:0 16px 24px;
  padding:18px 0 4px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:26px;
  box-shadow:0 18px 40px rgba(0,0,0,0.28);
  backdrop-filter:blur(14px);
}

.seriesHeader{
  padding:0 18px;
}

.seriesTitle{
  font-size:22px;
  font-weight:800;
  cursor:pointer;
  line-height:1.35;
}

.author{
  color:rgba(255,255,255,0.58);
  margin-top:6px;
  font-size:14px;
}

.tags{
  color:#93c5fd;
  margin-top:8px;
  font-size:13px;
}

.latestInfo{
  color:#86efac;
  margin-top:10px;
  font-size:14px;
  font-weight:600;
}

.missingInfo{
  color:#fca5a5;
  margin-top:6px;
  font-size:14px;
  font-weight:600;
}

.shelf{
  display:flex;
  overflow-x:auto;
  gap:16px;
  padding:18px;
  scroll-snap-type:x mandatory;
}

.shelf::-webkit-scrollbar{
  display:none;
}

.book{
  min-width:132px;
  text-align:center;
  scroll-snap-align:start;
}

.book img{
  width:132px;
  height:198px;
  object-fit:cover;
  border-radius:18px;
  background:#1f2937;
  box-shadow:0 14px 28px rgba(0,0,0,0.45);
}

.title{
  margin-top:10px;
  font-size:14px;
  color:rgba(255,255,255,0.86);
  line-height:1.4;
}

.volumeEdit{
  margin-top:10px;
  width:100%;
  background:rgba(255,255,255,0.10);
  color:#fff;
  border:1px solid rgba(255,255,255,0.12);
  padding:9px;
  font-size:13px;
  box-shadow:none;
}

.editArea{
  width:280px;
  max-width:90vw;
  margin-top:12px;
  background:rgba(5,7,10,0.92);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-sizing:border-box;
}

.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:92px;
  background:rgba(10,14,20,0.86);
  border-top:1px solid rgba(255,255,255,0.1);
  display:grid;
  grid-template-columns:1fr 1fr 1.35fr 1fr 1fr;
  align-items:center;
  backdrop-filter:blur(18px);
  z-index:100;
  padding:0 6px env(safe-area-inset-bottom);
  box-sizing:border-box;
}

.navButton{
  width:auto;
  min-width:0;
  background:none;
  border:none;
  color:rgba(255,255,255,0.72);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:10px;
  gap:5px;
  box-shadow:none;
  padding:8px 2px;
}

.navButton:active{
  transform:scale(0.94);
}

.navIcon{
  font-size:21px;
  line-height:1;
}

.addNavButton{
  transform:translateY(-18px);
  color:#fff;
}

.addNavButton:active{
  transform:translateY(-18px) scale(0.94);
}

.addIcon{
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg, #60a5fa, #a78bfa);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:500;
  box-shadow:0 16px 34px rgba(96,165,250,0.35);
  border:1px solid rgba(255,255,255,0.28);
}

.addLabel{
  margin-top:2px;
  font-size:10px;
  color:rgba(255,255,255,0.9);
}

.settingsCard{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
  backdrop-filter:blur(14px);
}

.settingsTitle{
  font-size:20px;
  font-weight:800;
}

.settingsText{
  color:rgba(255,255,255,0.62);
  font-size:14px;
  line-height:1.7;
}

.formCard{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
  backdrop-filter:blur(14px);
}

.scannerCard{
  background:
    linear-gradient(135deg, rgba(96,165,250,0.18), rgba(167,139,250,0.12)),
    rgba(255,255,255,0.07);
}

.formCardTitle{
  font-size:20px;
  font-weight:800;
}

.formCardText{
  color:rgba(255,255,255,0.62);
  font-size:14px;
  line-height:1.7;
}

.inputLabel{
  color:rgba(255,255,255,0.68);
  font-size:13px;
  font-weight:700;
  margin-top:4px;
}

.formGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.scanButton{
  background:linear-gradient(135deg, #60a5fa, #a78bfa);
  color:#fff;
}

.primaryActionButton{
  margin-top:4px;
  background:linear-gradient(135deg, #ffffff, #bfdbfe);
  color:#05070a;
  font-size:17px;
  padding:16px;
}

textarea{
  min-height:96px;
  resize:vertical;
  line-height:1.6;
}

.editArea textarea{
  min-height:82px;
  font-size:14px;
}

.editArea input,
.editArea textarea{
  padding:10px 12px;
  border-radius:12px;
}

.detailCard{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
  backdrop-filter:blur(14px);
}

.backButton{
  width:auto;
  align-self:flex-start;
  background:rgba(255,255,255,0.10);
  color:#fff;
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:none;
  padding:10px 14px;
  font-size:14px;
}

.detailImage{
  width:180px;
  height:270px;
  object-fit:cover;
  border-radius:22px;
  align-self:center;
  background:#1f2937;
  box-shadow:0 18px 36px rgba(0,0,0,0.45);
}

.detailTitle{
  font-size:26px;
  font-weight:900;
  line-height:1.35;
  text-align:center;
}

.detailAuthor{
  color:rgba(255,255,255,0.62);
  font-size:15px;
  text-align:center;
}

.detailInfoGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.detailInfoItem,
.detailSection{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:14px;
}

.detailLabel{
  color:rgba(255,255,255,0.5);
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
}

.detailValue{
  color:rgba(255,255,255,0.9);
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
}

.detailMemo{
  color:rgba(255,255,255,0.86);
  font-size:15px;
  line-height:1.7;
  white-space:pre-wrap;
  word-break:break-word;
}

.book img{
  cursor:pointer;
}

.book img:active{
  transform:scale(0.97);
}

#editScreen .backButton{
  width:100%;
  justify-content:center;
  text-align:center;
}

.dangerButton{
  background:rgba(239,68,68,0.18);
  color:#fecaca;
  border:1px solid rgba(248,113,113,0.35);
  box-shadow:none;
}

.dangerButton:active{
  transform:scale(0.98);
}

.subActionButton{
  background:rgba(96,165,250,0.18);
  color:#bfdbfe;
  border:1px solid rgba(96,165,250,0.35);
  box-shadow:none;
  font-size:15px;
}

.countBadge{
  margin:0 20px 10px;
  padding:10px 14px;
  width:fit-content;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:999px;
  color:rgba(255,255,255,0.78);
  font-size:13px;
  font-weight:700;
}

</style>
</head>

<input id="editScreenTitleInput" placeholder="作品名">

<script>

let books = []
let db
let currentCategory = 'マンガ'
let openedSeries = null
let novelViewMode = 'title'
let scanner = null
let selectedImage = ''
let currentDetailIndex = null
const RAKUTEN_APP_ID = '0191866f-a000-43d2-a501-7af5de32589a'
const RAKUTEN_ACCESS_KEY = 'pk_PWC431uWAdMVCGgvmubpYDPvLrko9tFjp0CMgdVOdf5'

/* =========================
DB

function openDB(){

return new Promise((resolve,reject)=>{

const request =
indexedDB.open('BookShelfDB',1)

request.onupgradeneeded =
function(event){

db = event.target.result

if(
!db.objectStoreNames.contains('books')
){

db.createObjectStore(
'books',
{
keyPath:'id',
autoIncrement:true

/* =========================
画像
========================= */

async function imageUrlToBase64(url){

const response =
await fetch(url)

if(!response.ok){
throw new Error('画像が見つかりません')
}

const contentType =
response.headers.get('content-type') || ''

if(!contentType.startsWith('image/')){
throw new Error('画像データではありません')
}

const blob =
await response.blob()

if(blob.size < 500){
throw new Error('画像サイズが小さすぎます')
}

return new Promise(resolve=>{

const reader =
new FileReader()

reader.onloadend =
()=>resolve(reader.result)

reader.readAsDataURL(blob)

})

}

function canLoadImage(url){

return new Promise(resolve=>{

const img =
new Image()

img.onload =
function(){
resolve(true)
}

img.onerror =
function(){
resolve(false)
}

img.src = url

})

}

/* =========================
ISBN補正
========================= */

function normalizeISBN(code){

const cleaned =
String(code)
.replace(/[^0-9]/g,'')

if(
cleaned.length === 13 &&
cleaned.startsWith('978')
){

return cleaned

}

const match =
cleaned.match(/978\d{10}/)

if(match){

return match[0]

}

return null

}

function formatDateForInput(value){

if(!value){
return ''
}

const text = String(value)

if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
return text
}

if(/^\d{4}-\d{2}$/.test(text)){
return text + '-01'
}

if(/^\d{8}$/.test(text)){

return (
text.slice(0,4) +
'-' +
text.slice(4,6) +
'-' +
text.slice(6,8)
)

}

if(/^\d{6}$/.test(text)){

return (
text.slice(0,4) +
'-' +
text.slice(4,6) +
'-01'
)

}

if(/^\d{4}$/.test(text)){
return text + '-01-01'
}

return ''

}

async function fetchBookInfoByISBN(isbn){

let title=''
let author=''
let cover=''
let publisher=''
let publishedDate=''

/* openBD */
try{

const response =
await fetch(
`https://api.openbd.jp/v1/get?isbn=${isbn}`
)

const data =
await response.json()

if(data[0]){

const summary =
data[0].summary || {}

title =
summary.title || ''

author =
summary.author || ''

cover =
(summary.cover || '').replace('http://','https://')

publisher =
summary.publisher || ''

publishedDate =
summary.pubdate || ''

}

}catch(error){

console.log(error)

}

/* Rakuten Books */
try{

const rakutenBook =
await searchRakutenBooks(isbn)

if(rakutenBook){

title =
title || rakutenBook.title || ''

author =
author || rakutenBook.author || ''

publisher =
publisher || rakutenBook.publisher || ''

publishedDate =
publishedDate || rakutenBook.publishedDate || ''

if(rakutenBook.cover){
cover = rakutenBook.cover
}

}

}catch(error){

console.log(error)

}

if(!title){
return null
}

/* 画像 */
let image = ''

const coverCandidates = []

if(cover){
coverCandidates.push(cover)
}

for(const candidate of coverCandidates){

try{

image =
await imageUrlToBase64(candidate)

if(image){
break
}

}catch(error){

console.log('Base64化失敗:', candidate, error)

const isDisplayable =
await canLoadImage(candidate)

if(isDisplayable){

image = candidate
break

}

}

}

return {
title,
author,
publisher,
publishedDate,
cover:image
}

}

.toLowerCase()
.replace(/\s+/g,'')

function compareJapaneseText(a,b){

return getSortText(a).localeCompare(
getSortText(b),
'ja',
{
numeric:true,
sensitivity:'base'
}
)

}

}

(
book.title +
book.author +
(book.tags || []).join(',')
)
.toLowerCase()
.includes(keyword)

if(keyword && !match){
return

let groupKey=''

novelViewMode === 'title'

novelViewMode === 'title'
? (book.titleKana || book.title || groupKey)
: (book.authorKana || book.author || groupKey)
),
items:[]
}

}

groupedBooks[groupKey].push({

...book,
originalIndex:index

})

})

Object.keys(groupedBooks)
.sort((a,b)=>compareJapaneseText(
groupedBooks[a].sortKey,
groupedBooks[b].sortKey

const latestElement =
document.createElement('div')

latestElement.className='latestInfo'

latestElement.innerText =
`最新刊 ${latest}巻`

header.appendChild(
latestElement
)

const missing =
getMissingVolumes(
volumes,
latest
)

const missingElement =
document.createElement('div')

missingElement.className='missingInfo'

missingElement.innerText =
missing.length
? `抜け巻: ${missing.join(', ')}`
: '抜け巻なし'

header.appendChild(
missingElement
)

}

series.appendChild(header)

if(openedSeries === groupKey){

const row =
document.createElement('div')

row.className='shelf'

grouped.forEach(book=>{

const card =
document.createElement('div')

card.className='book'

const subTitle =
currentCategory === 'マンガ'
? `${book.volume || ''}巻`
: (
novelViewMode === 'author'
? book.title
: (
book.author || ''
)
)

card.innerHTML=`

<img
onclick="openDetail(${book.originalIndex})"
src="${
book.image ||
'https://placehold.jp/222222/ffffff/140x210.png?text=NO+IMAGE'
}"
>

<div class="title">
${subTitle}
</div>
`

row.appendChild(card)

})

series.appendChild(row)

}

shelf.appendChild(series)

})

}

/* =========================
バックアップ
========================= */

function exportBooks(){

const data =
JSON.stringify(books,null,2)

const blob =
new Blob(
[data],
{type:'application/json'}
)

const url =
URL.createObjectURL(blob)

const a =
document.createElement('a')

a.href=url

a.download='bookshelf-backup.json'

a.click()

URL.revokeObjectURL(url)

}

function importBooks(event){

const file =
event.target.files[0]

if(!file)return

const reader =
new FileReader()

reader.onload =
function(e){

books =
JSON.parse(e.target.result)

saveBooks()

renderBooks()

alert('復元完了')

}

reader.readAsText(file)

}

/* =========================
起動
========================= */

async function startApp(){

await openDB()

await loadBooks()

renderBooks()

updateCountBadges()

}

startApp()

</script>
